server {
  listen 8080 default_server;
  listen [::]:8080 default_server;
  server_name test.example.com;

  return 301 https://test.example.com:8443$request_uri;
}

server {
  listen 8443 ssl http2;
  listen [::]:8443 ssl http2;
  server_name test.example.com;

  ssl_certificate /etc/bitwarden/ssl.crt;
  ssl_certificate_key /etc/bitwarden/ssl.key;
  ssl_session_timeout 30m;
  ssl_session_cache shared:SSL:20m;
  ssl_session_tickets off;

  # Diffie-Hellman parameter for DHE ciphersuites, recommended 2048 bits
  ssl_dhparam /etc/bitwarden/dh.pem;

  ssl_protocols TLSv1.2;
  ssl_ciphers "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256";
  # Enables server-side protection from BEAST attacks
  ssl_prefer_server_ciphers on;

  # OCSP Stapling ---
  # Fetch OCSP records from URL in ssl_certificate and cache them
  ssl_stapling on;
  ssl_stapling_verify on;

  # Verify chain of trust of OCSP response using Root CA and Intermediate certs
  ssl_trusted_certificate /etc/bitwarden/ca.crt;
  resolver 1.1.1.1 1.0.0.1 9.9.9.9 149.112.112.112 valid=300s;

  include /etc/nginx/security-headers-ssl.conf;
  include /etc/nginx/security-headers.conf;

  set_real_ip_from 10.0.0.1;
  set_real_ip_from 10.0.0.2;
  set_real_ip_from 10.0.0.3;
  real_ip_header X-Forwarded-For;
  real_ip_recursive on;

  location / {
    root /app/Web;
    include /etc/nginx/security-headers-ssl.conf;
    include /etc/nginx/security-headers.conf;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://haveibeenpwned.com; child-src 'self' https://*.duosecurity.com https://*.duofederal.com; frame-src 'self' https://*.duosecurity.com https://*.duofederal.com; connect-src 'self' https://api.pwnedpasswords.com https://api.2fa.directory https://app.simplelogin.io/api/alias/random/new; object-src 'self' blob:;";
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Robots-Tag "noindex, nofollow";
  }

  location /alive {
    default_type text/plain;
    return 200 $date_gmt;
  }

  location = /app-id.json {
    root /app/Web;
    include /etc/nginx/security-headers-ssl.conf;
    include /etc/nginx/security-headers.conf;
    proxy_hide_header Content-Type;
    add_header Content-Type $fido_content_type;
  }

  location = /duo-connector.html {
    root /app/Web;
  }

  location = /webauthn-connector.html {
    root /app/Web;
  }

  location = /webauthn-fallback-connector.html {
    root /app/Web;
  }

  location = /sso-connector.html {
    root /app/Web;
  }

  location = /captcha-connector.html {
    root /app/Web;
  }

  location = /captcha-mobile-connector.html {
    root /app/Web;
  }

  location /attachments/ {
    alias /etc/bitwarden/attachments/;
  }

  location /api/ {
    proxy_pass http://localhost:5001/;
  }

  location /icons/ {
    proxy_pass http://localhost:5004/;
  }

  location /notifications/ {
    proxy_pass http://localhost:5006/;
  }

  location /notifications/hub {
    proxy_pass http://localhost:5006/hub;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
  }

  location /notifications/anonymous-hub {
    proxy_pass http://localhost:5006/anonymous-hub;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
  }

  location /events/ {
    proxy_pass http://localhost:5003/;
  }

  location /sso {
    proxy_pass http://localhost:5007;
    include /etc/nginx/security-headers-ssl.conf;
    include /etc/nginx/security-headers.conf;
    add_header X-Frame-Options SAMEORIGIN;
  }

  location /identity {
    proxy_pass http://localhost:5005;
    include /etc/nginx/security-headers-ssl.conf;
    include /etc/nginx/security-headers.conf;
    add_header X-Frame-Options SAMEORIGIN;
  }

  location /admin {
    proxy_pass http://localhost:5000;
    include /etc/nginx/security-headers-ssl.conf;
    include /etc/nginx/security-headers.conf;
    add_header X-Frame-Options SAMEORIGIN;
  }

  location /scim/ {
    proxy_pass http://localhost:5002/;
  }

  location /key-connector/ {
    proxy_pass http://keyconnector:5000/;
  }
}
